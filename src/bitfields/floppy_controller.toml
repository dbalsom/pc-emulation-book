# NEC 765-compatible floppy controller registers and status bytes.


# --------------------------------------------------------------------------------------------------
# DOR
# --------------------------------------------------------------------------------------------------
[registers.digital-output-register]
name = "Digital Output Register (DOR)"
anchor = "digital-output-register"
bits = 8
description = "IBM-specific register used to select a drive, reset the controller, enable DMA/IRQ, and control drive motors."

[[registers.digital-output-register.register]]
address = "0x3F2"
access = "Primary, Write-Only"

[[registers.digital-output-register.register]]
address = "0x372"
access = "Secondary, Write-Only"

[[registers.digital-output-register.fields]]
name = "MOTD"
lsb = 7
width = 1
description = "**Drive D motor control.**<br>**0**: Motor off<br>**1**: Motor on"

[[registers.digital-output-register.fields]]
name = "MOTC"
lsb = 6
width = 1
description = "**Drive C motor control**<br>**0**: Motor off<br>**1**: Motor on"

[[registers.digital-output-register.fields]]
name = "MOTB"
lsb = 5
width = 1
description = "**Drive B motor control**<br>**0**: Motor off<br>**1**: Motor on"

[[registers.digital-output-register.fields]]
name = "MOTA"
lsb = 4
width = 1
description = "**Drive A motor control**<br>**0**: Motor off<br>**1**: Motor on"

[[registers.digital-output-register.fields]]
name = "DMA"
lsb = 3
width = 1
description = "**DMA and interrupt request enable**<br>**0**: Disable DMA/IRQ<br>**1**: Enable DMA/IRQ"

[[registers.digital-output-register.fields]]
name = "/RESET"
lsb = 2
width = 1
description = "**Controller reset gate**<br>**0**: Hold controller in reset<br>**1**: Enable controller"

[[registers.digital-output-register.fields]]
name = "DR"
lsb = 0
width = 2
description = "**Selected drive.**"
markdown-after = """
| DR1 | DR0 | Drive |
|:---:|:---:|:-----:|
| 0 | 0 | 0 (A) |
| 0 | 1 | 1 (B) |
| 1 | 0 | 2 (C/D) |
| 1 | 1 | 3 (D/E) |
"""

# --------------------------------------------------------------------------------------------------
# MAIN STATUS REGISTER
# --------------------------------------------------------------------------------------------------
[registers.main-status-register]
name = "Main Status Register (MSR)"
anchor = "main-status-register"
bits = 8
description = "Main controller status register that reports data transfer direction and busy status."

[[registers.main-status-register.register]]
address = "0x3F4"
access = "Read-Only, Primary"

[[registers.main-status-register.register]]
address = "0x374"
access = "Read-Only, Secondary"

[[registers.main-status-register.fields]]
name = "MRQ"
lsb = 7
width = 1
description = "**Main Request**<br>**0:** The controller is not expecting to send or receive data<br>**1:** The controller has data to send to the CPU, or is ready to receive the next byte of data"

[[registers.main-status-register.fields]]
name = "DIO"
lsb = 6
width = 1
description = "**Data Input/Output Direction**<br>**0**: Host to controller<br>**1**: Controller to host"

[[registers.main-status-register.fields]]
name = "NDMA"
lsb = 5
width = 1
description = "**Non-DMA execution mode indicator**<br>**0**: Controller in DMA mode<br>**1**: Controller in PIO (Non-DMA mode)"

[[registers.main-status-register.fields]]
name = "BUSY"
lsb = 4
width = 1
description = "Controller is busy"

[[registers.main-status-register.fields]]
name = "D3B"
lsb = 3
width = 1
description = "Drive 3 (D) is performing a seek or recalibrate operation"

[[registers.main-status-register.fields]]
name = "D2B"
lsb = 2
width = 1
description = "Drive 2 (C) is performing a seek or recalibrate operation"

[[registers.main-status-register.fields]]
name = "D1B"
lsb = 1
width = 1
description = "Drive 1 (B) is performing a seek or recalibrate operation"

[[registers.main-status-register.fields]]
name = "D0B"
lsb = 0
width = 1
description = "Drive 0 (A) is performing a seek or recalibrate operation"

# Data rate select register - not on original floppy controller

[registers.data-rate-select-register]
name = "Data Rate Select Register (DSR)"
anchor = "data-rate-select-register"
bits = 8
description = "PS/2 output register at the MSR write address. The low bits select the controller data rate."

[[registers.data-rate-select-register.register]]
address = "0x3F4"
access = "Write-Only"

[[registers.data-rate-select-register.register]]
address = "0x374"
access = "Write-Only"

[[registers.data-rate-select-register.fields]]
name = "Reserved"
lsb = 2
width = 6
description = "Reserved."

[[registers.data-rate-select-register.fields]]
name = "RAT"
lsb = 0
width = 2
description = "Selected data transfer rate."
markdown-after = """
| RAT1 | RAT0 | Data Rate |
|:----:|:----:|:---------:|
| 0 | 0 | 500 kbits/s |
| 0 | 1 | 300 kbits/s |
| 1 | 0 | 250 kbits/s |
| 1 | 1 | 1 Mbits/s |
"""

